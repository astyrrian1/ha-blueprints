name: Validate Blueprints

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint all YAML files
        run: yamllint -c .yamllint.yml .

  schema:
    name: Blueprint Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate blueprint structure
        run: |
          errors=0
          for f in $(find automation script -name '*.yaml' 2>/dev/null); do
            echo "Checking $f..."
            python3 -c "
          import yaml, sys
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          if data is None:
              print(f'  ✗ Empty file: $f')
              sys.exit(1)
          bp = data.get('blueprint', {})
          missing = []
          for field in ['name', 'domain', 'input']:
              if field not in bp:
                  missing.append(field)
          if 'source_url' not in bp:
              missing.append('source_url')
          if missing:
              print(f'  ✗ Missing fields in $f: {missing}')
              sys.exit(1)
          domain = bp.get('domain', '')
          if domain not in ('automation', 'script'):
              print(f'  ✗ Invalid domain \"{domain}\" in $f')
              sys.exit(1)
          print(f'  ✓ {bp[\"name\"]}')
          " || errors=$((errors + 1))
          done
          if [ "$errors" -gt 0 ]; then
            echo "❌ $errors blueprint(s) failed validation"
            exit 1
          fi
          echo "✅ All blueprints passed validation"
