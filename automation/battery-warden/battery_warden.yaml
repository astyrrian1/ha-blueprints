blueprint:
  name: 'System: Global Battery Warden V12.4 (Atomic)'
  description: 'Scans ALL battery sensors. * **Atomic Logic:** Calculates attribution
    in one step to prevent object errors. * **Anti-Dupe:** Checks for Active tasks
    before creating new ones. * **Gratitude:** Attributes maintenance to specific
    residents.

    '
  domain: automation
  input:
    threshold:
      name: Low Threshold (%)
      default: 20
      selector:
        number:
          min: 1.0
          max: 100.0
          mode: slider
          step: 1.0
    exclude_entities:
      name: Excluded Batteries
      default: []
      selector:
        entity:
          domain:
          - sensor
          device_class:
          - battery
          multiple: true
          reorder: false
    todo_list:
      name: To-Do List
      selector:
        entity:
          domain:
          - todo
          multiple: false
          reorder: false
    notify_target:
      name: Mobile Notification Target
      selector:
        device:
          integration: mobile_app
          multiple: true
    tts_engine:
      name: TTS Entity
      default: tts.google_ai_tts_3
      selector:
        entity:
          domain:
          - tts
          multiple: false
          reorder: false
  source_url: https://github.com/astyrrian1/ha-blueprints/blob/main/automation/battery-warden/battery_warden.yaml
mode: single
max_exceeded: silent
trigger:
- platform: time_pattern
  minutes: /15
action:
- action: todo.get_items
  target:
    entity_id: !input todo_list
  response_variable: current_items
- variables:
    todo_target: !input todo_list
    notify_devs: !input notify_target
    limit: !input threshold
    excluded_list: !input exclude_entities
    worker_name: "{% set home = states.person | selectattr('state','eq','home') |
      map(attribute='attributes.friendly_name') | list %} {% if home | length > 0
      %}\n  {{ home | join(' and ') }}\n{% else %}\n  {# Find the single most recent
      exit within the template scope #}\n  {% set recent = states.person | selectattr('state','ne','home')
      | sort(attribute='last_changed', reverse=true) | first %}\n  {% if recent is
      defined and recent is not none and (now() - recent.last_changed).total_seconds()
      < 600 %}\n    {{ recent.attributes.friendly_name }}\n  {% else %}\n    none\n
      \ {% endif %}\n{% endif %}"
    all_battery_ids: "{{ states.sensor \n   | selectattr('attributes.device_class',
      'defined') \n   | selectattr('attributes.device_class', 'eq', 'battery') \n
      \  | map(attribute='entity_id') | list }}"
    low_batteries: "{% set result = namespace(items=[]) %} {% for eid in all_battery_ids
      %}\n  {% if eid not in excluded_list %}\n    {% set val = states(eid) %}\n    {%
      if val not in ['unavailable', 'unknown'] and val | is_number and val | float
      <= limit | float %}\n      {% set result.items = result.items + [eid] %}\n    {%
      endif %}\n  {% endif %}\n{% endfor %} {{ result.items }}"
    healthy_batteries: "{% set result = namespace(items=[]) %} {% for eid in all_battery_ids
      %}\n  {% if eid not in excluded_list %}\n    {% set val = states(eid) %}\n    {%
      if val not in ['unavailable', 'unknown'] and val | is_number and val | float
      > limit | float %}\n      {% set result.items = result.items + [eid] %}\n    {%
      endif %}\n  {% endif %}\n{% endfor %} {{ result.items }}"
- repeat:
    for_each: '{{ low_batteries }}'
    sequence:
    - variables:
        raw_name: '{{ state_attr(repeat.item, ''friendly_name'') }}'
        dev_name: '{{ raw_name | regex_replace(find=''(?i)\s*(battery|level)'', replace='''')
          | trim }}'
        task_name: 'Replace Battery: {{ dev_name }}'
        active_uids: '{{ current_items[todo_target][''items''] | selectattr(''summary'',
          ''eq'', task_name) | selectattr(''status'', ''eq'', ''needs_action'') |
          map(attribute=''uid'') | list }}'
        closed_uids: '{{ current_items[todo_target][''items''] | selectattr(''summary'',
          ''eq'', task_name) | selectattr(''status'', ''eq'', ''completed'') | map(attribute=''uid'')
          | list }}'
    - choose:
      - conditions: '{{ active_uids | length > 0 }}'
        sequence: []
      - conditions: '{{ closed_uids | length > 0 }}'
        sequence:
        - action: todo.update_item
          target:
            entity_id: !input todo_list
          data:
            item: '{{ closed_uids[0] }}'
            status: needs_action
      default:
      - action: todo.add_item
        target:
          entity_id: !input todo_list
        data:
          item: '{{ task_name }}'
- repeat:
    for_each: '{{ healthy_batteries }}'
    sequence:
    - variables:
        raw_name: '{{ state_attr(repeat.item, ''friendly_name'') }}'
        dev_name: '{{ raw_name | regex_replace(find=''(?i)\s*(battery|level)'', replace='''')
          | trim }}'
        task_name: 'Replace Battery: {{ dev_name }}'
        notify_id: low_batt_{{ dev_name | slugify }}
        target_uids: '{{ current_items[todo_target][''items''] | selectattr(''summary'',
          ''eq'', task_name) | selectattr(''status'', ''eq'', ''needs_action'') |
          map(attribute=''uid'') | list }}'
    - if: '{{ target_uids | length > 0 }}'
      then:
      - action: todo.update_item
        target:
          entity_id: !input todo_list
        data:
          item: '{{ target_uids[0] }}'
          status: completed
      - if: '{{ worker_name != ''none'' }}'
        then:
        - repeat:
            for_each: '{{ notify_devs }}'
            sequence:
            - action: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify
                }}
              data:
                title: "\U0001F50B Battery Recharged!"
                message: "{% set dev = device_attr(repeat.item, 'name') | lower %}
                  {% if worker_name | lower in dev %}\n  You slayed that task! ✅\n{%
                  else %}\n  {{ worker_name }} just saved the {{ dev_name }}! ❤️\n{%
                  endif %}"
                data:
                  tag: gratitude_{{ notify_id }}
        - event: gratitude_award
          event_data:
            person: '{{ worker_name }}'
            chore: Battery Replacement
      - action: persistent_notification.dismiss
        data:
          notification_id: '{{ notify_id }}'
