blueprint:
  name: 'System: Smart Appliance Monitor V14 (Nuclear)'
  description: >-
    Nuclear Appliance Management.
    * **Features:** Finish Sensor + Power Sensor + Blocking Entity.
    * **Voice:** Configurable Volume + TTS.
    * **AI Sass:** Generates sassy announcements (with Circuit Breaker).
    * **Nag:** Repeats alerts every hour if ignored, with early exit if not applicable.
    * **Gratitude:** Credits the person who emptied the appliance.
    * **Alerts:** Voice, Mobile, and Signal.
  domain: automation
  input:
    appliance_name:
      name: Appliance Name
      default: Dryer
    finish_sensor:
      name: Finish Sensor
      description: Binary Sensor that turns ON when complete (e.g. Washer Job State).
      selector:
        entity:
          domain:
          - binary_sensor
          multiple: false
          reorder: false
    power_sensor:
      name: Power Status Sensor
      description: Turns OFF when the machine is powered down/unloaded.
      selector:
        entity:
          domain:
          - switch
          - binary_sensor
          multiple: false
          reorder: false
    block_entity:
      name: Blocking Entity (Optional)
      description: If ON, skips alerts (e.g. Dryer running blocks Washer).
      default: []
      selector:
        entity:
          multiple: false
          reorder: false
    todo_list:
      name: To-Do List
      selector:
        entity:
          domain:
          - todo
          multiple: false
          reorder: false
    notify_target:
      name: Mobile Targets
      selector:
        device:
          integration: mobile_app
          multiple: true
    ai_task_entity:
      name: AI Generator
      default: ai_task.google_ai_task
      selector:
        entity:
          domain:
          - ai_task
          multiple: false
          reorder: false
    tts_engine:
      name: TTS Entity
      default: tts.google_ai_tts_3
      selector:
        entity:
          domain:
          - tts
          multiple: false
          reorder: false
    announce_volume:
      name: Announcement Volume
      default: 0.6
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.05
          mode: slider
    signal_group_target:
      name: Signal Group Target (Optional)
      description: Base64-encoded Signal group ID for Signal messenger alerts.
      default: ''
      selector:
        text: {}
  source_url: https://github.com/astyrrian1/ha-blueprints/blob/main/automation/appliance-monitor/appliance_monitor.yaml
variables:
  name: !input appliance_name
  finish_ent: !input finish_sensor
  power_ent: !input power_sensor
  block_ent: !input block_entity
  todo_target: !input todo_list
  notify_devs: !input notify_target
  ai_ent: !input ai_task_entity
  tts_ent: !input tts_engine
  vol: !input announce_volume
  signal_target: !input signal_group_target
  task_title: Empty {{ name }}
mode: queued
max: 3
max_exceeded: silent
trigger:
- platform: state
  entity_id: !input finish_sensor
  to: 'on'
  id: finished
- platform: state
  entity_id: !input power_sensor
  to: 'off'
  id: cleared
- platform: time_pattern
  hours: /1
  id: nag
condition: []
action:
# --- Early exit for nag trigger when appliance isn't in finished state ---
- condition: template
  value_template: >-
    {% if trigger.id == 'nag' %}
      {{ is_state(finish_ent, 'on') and is_state(power_ent, 'on') }}
    {% else %}
      true
    {% endif %}
- action: todo.get_items
  target:
    entity_id: !input todo_list
  response_variable: current_items
- variables:
    home_persons: >-
      {{ states.person | selectattr('state','eq','home')
         | map(attribute='attributes.friendly_name') | list }}
    recent_person: >-
      {% set recent = states.person
         | selectattr('state','ne','home')
         | sort(attribute='last_changed', reverse=true)
         | first | default(none) %}
      {% if recent is not none and (now() - recent.last_changed).total_seconds() < 600 %}
        {{ recent.attributes.friendly_name }}
      {% endif %}
    worker_name: >-
      {% if home_persons | length > 0 %}
        {{ home_persons | join(' and ') }}
      {% elif recent_person | length > 0 %}
        {{ recent_person }}
      {% endif %}
    has_worker: >-
      {{ home_persons | length > 0 or recent_person | length > 0 }}
- choose:
  # --- Path 1: Appliance emptied (power off) — complete task + gratitude ---
  - conditions:
    - condition: state
      entity_id: !input power_sensor
      state: 'off'
    sequence:
    - variables:
        open_task_uids: >-
          {{ current_items[todo_target]['items']
             | selectattr('summary', 'eq', task_title)
             | selectattr('status', 'eq', 'needs_action')
             | map(attribute='uid') | list }}
    - if: '{{ open_task_uids | length > 0 }}'
      then:
      - repeat:
          for_each: '{{ open_task_uids }}'
          sequence:
          - action: todo.update_item
            target:
              entity_id: !input todo_list
            data:
              item: '{{ repeat.item }}'
              status: completed
      - if: '{{ has_worker }}'
        then:
        - repeat:
            for_each: '{{ notify_devs }}'
            sequence:
            - action: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
              data:
                title: "✅ {{ name }} Emptied!"
                message: >-
                  {% set dev = device_attr(repeat.item, 'name') | lower %}
                  {% if worker_name | lower in dev %}
                    You emptied the {{ name | lower }}! 🙌
                  {% else %}
                    {{ worker_name }} just emptied the {{ name | lower }}! ❤️
                  {% endif %}
                data:
                  tag: gratitude_{{ name | slugify }}
        - event: gratitude_award
          event_data:
            person: '{{ worker_name }}'
            chore: Emptying {{ name }}
  # --- Path 2: Appliance finished — create task + announce ---
  - conditions:
    - condition: state
      entity_id: !input finish_sensor
      state: 'on'
    - condition: state
      entity_id: !input power_sensor
      state: 'on'
    - condition: template
      value_template: >-
        {% if block_ent is string and block_ent | length > 0 %}
          {{ is_state(block_ent, 'off') }}
        {% else %}
          true
        {% endif %}
    sequence:
    - variables:
        open_uids: >-
          {{ current_items[todo_target]['items']
             | selectattr('summary', 'eq', task_title)
             | selectattr('status', 'eq', 'needs_action')
             | map(attribute='uid') | list }}
        closed_uids: >-
          {{ current_items[todo_target]['items']
             | selectattr('summary', 'eq', task_title)
             | selectattr('status', 'eq', 'completed')
             | map(attribute='uid') | list }}
        has_open: '{{ open_uids | length > 0 }}'
        has_closed: '{{ closed_uids | length > 0 }}'
    - if: '{{ has_closed and (not has_open) }}'
      then:
      - action: todo.update_item
        target:
          entity_id: !input todo_list
        data:
          item: '{{ closed_uids[0] }}'
          status: needs_action
    - if: '{{ (not has_closed) and (not has_open) }}'
      then:
      - action: todo.add_item
        target:
          entity_id: !input todo_list
        data:
          item: '{{ task_title }}'
    - action: ai_task.generate_data
      continue_on_error: true
      data:
        entity_id: '{{ ai_ent }}'
        task_name: Appliance Finish
        instructions: >-
          Persona: Sassy Assistant. Context: The {{ name }} has finished
          its cycle. Trigger: {{ trigger.id }} (Note: 'nag' means it's been sitting
          there). Task: Announce it needs to be emptied. Tone: If 'nag', be impatient.
          If 'finished', be helpful. Format: Short sentence for TTS.
        structure:
          spoken_text:
            selector:
              text: {}
      response_variable: ai_speech
    - variables:
        final_speech: >-
          {% if ai_speech is defined and ai_speech.data is defined %}
            {{ ai_speech.data.spoken_text }}
          {% else %}
            The {{ name | lower }} is finished. Please empty it.
          {% endif %}
    - action: script.system_smart_voice_broadcast
      data:
        message: '{{ final_speech }}'
        tts_entity: '{{ tts_ent }}'
        announce_volume: '{{ vol }}'
    - if:
      - condition: time
        after: 09:00:00
        before: '23:00:00'
      then:
      - repeat:
          for_each: '{{ notify_devs }}'
          sequence:
          - action: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
            data:
              title: '{{ name }} Finished'
              message: '{{ final_speech }}'
              data:
                tag: '{{ name | slugify }}_finished'
                ttl: 3600
                priority: high
      - if:
        - condition: template
          value_template: '{{ signal_target | length > 0 }}'
        then:
        - action: notify.signal
          data:
            message: '{{ name }} is Finished'
            title: '{{ name }} is Finished'
            target: '{{ signal_target }}'
          enabled: true
