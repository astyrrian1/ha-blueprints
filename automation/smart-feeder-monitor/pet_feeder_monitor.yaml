blueprint:
  name: 'System: Smart Feeder Monitor V12 (Hybrid)'
  description: >-
    Nuclear Feeder Management.
    * **Fix:** Boolean comparisons use `| bool` filter for safety.
    * **Queued Mode:** Handles simultaneous sensor changes without dropping events.
    * **Voice:** AI-powered sassy TTS announcements with circuit-breaker fallback.
    * **Debounce:** Triggers use `for:` to ignore momentary sensor flickers.
    * **Smart Desiccant:** Only fires on threshold crossing, not every update.
  domain: automation
  input:
    feeder_name:
      name: Feeder Name
      default: Feeder
    food_status_sensor:
      name: Food Status
      selector:
        entity:
          domain:
          - binary_sensor
          device_class:
          - problem
          multiple: false
          reorder: false
    desiccant_sensor:
      name: Desiccant Days
      selector:
        entity:
          domain:
          - sensor
          device_class:
          - duration
          multiple: false
          reorder: false
    dispenser_sensor:
      name: Dispenser/Jam
      selector:
        entity:
          domain:
          - binary_sensor
          device_class:
          - problem
          multiple: false
          reorder: false
    desiccant_threshold:
      name: Desiccant Threshold
      default: 3
      selector:
        number:
          min: 0.0
          max: 30.0
          unit_of_measurement: days
          step: 1.0
          mode: slider
    todo_list:
      name: To-Do List
      selector:
        entity:
          domain:
          - todo
          multiple: false
          reorder: false
    notify_target:
      name: Mobile Target
      selector:
        device:
          integration: mobile_app
          multiple: true
    ai_task_entity:
      name: AI Task Entity (Optional)
      description: AI entity for generating sassy voice announcements.
      default: ai_task.google_ai_task
      selector:
        entity:
          domain:
          - ai_task
          multiple: false
          reorder: false
    tts_engine:
      name: TTS Entity (Optional)
      description: Text-to-speech provider for voice broadcasts.
      default: tts.google_ai_tts_3
      selector:
        entity:
          domain:
          - tts
          multiple: false
          reorder: false
    announce_volume:
      name: Announcement Volume
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.05
          mode: slider
  source_url: https://github.com/astyrrian1/ha-blueprints/blob/main/automation/smart-feeder-monitor/pet_feeder_monitor.yaml
mode: queued
max: 5
trigger:
- platform: state
  entity_id:
  - !input food_status_sensor
  - !input dispenser_sensor
  for: 00:02:00
  id: binary_change
- platform: numeric_state
  entity_id: !input desiccant_sensor
  below: !input desiccant_threshold
  id: desiccant_low
- platform: numeric_state
  entity_id: !input desiccant_sensor
  above: !input desiccant_threshold
  id: desiccant_ok
action:
- action: todo.get_items
  target:
    entity_id: !input todo_list
  response_variable: current_items
- variables:
    todo_target: !input todo_list
    notify_devs: !input notify_target
    name: !input feeder_name
    f_sensor: !input food_status_sensor
    d_sensor: !input desiccant_sensor
    j_sensor: !input dispenser_sensor
    d_limit: !input desiccant_threshold
    ai_ent: !input ai_task_entity
    tts_ent: !input tts_engine
    vol: !input announce_volume
    home_persons: >-
      {{ states.person | selectattr('state','eq','home')
         | map(attribute='attributes.friendly_name') | list }}
    recent_person: >-
      {% set recent = states.person
         | selectattr('state','ne','home')
         | sort(attribute='last_changed', reverse=true)
         | first | default(none) %}
      {% if recent is not none and (now() - recent.last_changed).total_seconds() < 600 %}
        {{ recent.attributes.friendly_name }}
      {% endif %}
    worker_name: >-
      {% if home_persons | length > 0 %}
        {{ home_persons | join(' and ') }}
      {% elif recent_person | length > 0 %}
        {{ recent_person }}
      {% endif %}
    has_worker: >-
      {{ home_persons | length > 0 or recent_person | length > 0 }}
    checks:
    - type: food
      is_issue: '{{ is_state(f_sensor, ''on'') }}'
      task: Refill {{ name }}
      id: feeder_{{ name | slugify }}_food
    - type: desiccant
      is_issue: '{{ states(d_sensor) | float(99) <= d_limit | float }}'
      task: 'Replace Desiccant: {{ name }}'
      id: feeder_{{ name | slugify }}_desi
    - type: jam
      is_issue: '{{ is_state(j_sensor, ''on'') }}'
      task: 'Fix Jam: {{ name }}'
      id: feeder_{{ name | slugify }}_jam
- repeat:
    for_each: '{{ checks }}'
    sequence:
    - variables:
        active_uids: >-
          {{ current_items[todo_target]['items']
             | selectattr('summary', 'eq', repeat.item.task)
             | selectattr('status', 'eq', 'needs_action')
             | map(attribute='uid') | list }}
        closed_uids: >-
          {{ current_items[todo_target]['items']
             | selectattr('summary', 'eq', repeat.item.task)
             | selectattr('status', 'eq', 'completed')
             | map(attribute='uid') | list }}
    - choose:
      # --- Issue detected: create or reopen task ---
      - conditions: '{{ repeat.item.is_issue | bool }}'
        sequence:
        - choose:
          - conditions: '{{ active_uids | length > 0 }}'
            sequence: []
          - conditions: '{{ closed_uids | length > 0 }}'
            sequence:
            - action: todo.update_item
              target:
                entity_id: !input todo_list
              data:
                item: '{{ closed_uids[0] }}'
                status: needs_action
          default:
          - action: todo.add_item
            target:
              entity_id: !input todo_list
            data:
              item: '{{ repeat.item.task }}'
        # --- Voice announcement for new issues ---
        - if: '{{ active_uids | length == 0 }}'
          then:
          - action: ai_task.generate_data
            continue_on_error: true
            data:
              entity_id: '{{ ai_ent }}'
              task_name: Feeder Alert
              instructions: >-
                Persona: Sassy Assistant. The {{ name }} has a {{ repeat.item.type }} issue.
                Announce it needs attention. Format: Short sentence for TTS.
              structure:
                spoken_text:
                  selector:
                    text: {}
            response_variable: ai_speech
          - variables:
              final_speech: >-
                {% if ai_speech is defined and ai_speech.data is defined %}
                  {{ ai_speech.data.spoken_text }}
                {% else %}
                  The {{ name | lower }} needs attention. {{ repeat.item.type | title }} issue detected.
                {% endif %}
          - action: script.system_smart_voice_broadcast
            data:
              message: '{{ final_speech }}'
              tts_entity: '{{ tts_ent }}'
              announce_volume: '{{ vol }}'
      # --- Issue resolved: complete task + gratitude ---
      - conditions: '{{ not (repeat.item.is_issue | bool) }}'
        sequence:
        - if: '{{ active_uids | length > 0 }}'
          then:
          - action: todo.update_item
            target:
              entity_id: !input todo_list
            data:
              item: '{{ active_uids[0] }}'
              status: completed
          - if: '{{ has_worker }}'
            then:
            - repeat:
                for_each: '{{ notify_devs }}'
                sequence:
                - action: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                  data:
                    title: "\U0001F43E Feeder Serviced"
                    message: >-
                      {% set dev = device_attr(repeat.item, 'name') | lower %}
                      {% if worker_name | lower in dev %}
                        You slayed that maintenance! ✅
                      {% else %}
                        {{ worker_name }} just fixed the {{ repeat.item.type }} issue! ❤️
                      {% endif %}
                    data:
                      tag: gratitude_{{ repeat.item.id }}
            - event: gratitude_award
              event_data:
                person: '{{ worker_name }}'
                chore: Feeder Service ({{ repeat.item.type }})
        - action: persistent_notification.dismiss
          data:
            notification_id: '{{ repeat.item.id }}'
