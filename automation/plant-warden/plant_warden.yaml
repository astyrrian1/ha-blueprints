blueprint:
  name: 'System: Global Plant Warden V7.0 (Hybrid Scanner)'
  description: >-
    Nuclear Plant Management.
    * **Hybrid Engine:** Reacts instantly to changes, BUT also scans every 30m
    to catch "missed" plants.
    * **Safety Net:** Runs on Home Assistant Start to check status immediately.
    * **Atomic Logic:** Fixed attribution to prevent crashes.
    * **Anti-Dupe:** Safely scans repeatedly without creating duplicate tasks.
  domain: automation
  input:
    plant_entities:
      name: Plants to Monitor
      selector:
        entity:
          domain:
          - plant
          multiple: true
          reorder: false
    todo_list:
      name: To-Do List
      selector:
        entity:
          domain:
          - todo
          reorder: false
          multiple: false
    notify_target:
      name: Mobile Target
      selector:
        device:
          integration: mobile_app
          multiple: true
    exclude_entities:
      name: Excluded Plants
      default: []
      selector:
        entity:
          domain:
          - plant
          multiple: true
          reorder: false
  source_url: https://github.com/astyrrian1/ha-blueprints/blob/main/automation/plant-warden/plant_warden.yaml
mode: queued
max: 10
trigger:
- platform: state
  entity_id: !input plant_entities
  to: problem
  for: 00:05:00
  id: plant_problem
- platform: state
  entity_id: !input plant_entities
  to: ok
  for: 00:05:00
  id: plant_recovered
- platform: time_pattern
  minutes: /30
  id: scheduled_scan
- platform: homeassistant
  event: start
  id: startup_scan
action:
- action: todo.get_items
  target:
    entity_id: !input todo_list
  response_variable: current_items
- variables:
    todo_target: !input todo_list
    notify_devs: !input notify_target
    excluded_list: !input exclude_entities
    monitored_plants: !input plant_entities
    target_list: >-
      {% if trigger.id in ['plant_problem', 'plant_recovered'] %}
        {{ [trigger.entity_id] }}
      {% else %}
        {{ monitored_plants }}
      {% endif %}
    home_persons: >-
      {{ states.person | selectattr('state','eq','home')
         | map(attribute='attributes.friendly_name') | list }}
    recent_person: >-
      {% set recent = states.person
         | selectattr('state','ne','home')
         | sort(attribute='last_changed', reverse=true)
         | first | default(none) %}
      {% if recent is not none and (now() - recent.last_changed).total_seconds() < 600 %}
        {{ recent.attributes.friendly_name }}
      {% endif %}
    worker_name: >-
      {% if home_persons | length > 0 %}
        {{ home_persons | join(' and ') }}
      {% elif recent_person | length > 0 %}
        {{ recent_person }}
      {% endif %}
    has_worker: >-
      {{ home_persons | length > 0 or recent_person | length > 0 }}
- repeat:
    for_each: '{{ target_list }}'
    sequence:
    - if: '{{ repeat.item not in excluded_list }}'
      then:
      - variables:
          entity: '{{ repeat.item }}'
          current_state: '{{ states(entity) }}'
          raw_name: '{{ state_attr(entity, ''friendly_name'') }}'
          area: '{{ area_name(entity) | default('''') }}'
          task_name: >-
            {% if area | length > 0 %}
              Water {{ raw_name }} ({{ area }})
            {% else %}
              Water {{ raw_name }}
            {% endif %}
          active_uids: >-
            {{ current_items[todo_target]['items']
               | selectattr('summary', 'eq', task_name)
               | selectattr('status', 'eq', 'needs_action')
               | map(attribute='uid') | list }}
          closed_uids: >-
            {{ current_items[todo_target]['items']
               | selectattr('summary', 'eq', task_name)
               | selectattr('status', 'eq', 'completed')
               | map(attribute='uid') | list }}
      - choose:
        - conditions: '{{ current_state == ''problem'' }}'
          sequence:
          - choose:
            - conditions: '{{ active_uids | length > 0 }}'
              sequence: []
            - conditions: '{{ closed_uids | length > 0 }}'
              sequence:
              - action: todo.update_item
                target:
                  entity_id: !input todo_list
                data:
                  item: '{{ closed_uids[0] }}'
                  status: needs_action
            default:
            - action: todo.add_item
              target:
                entity_id: !input todo_list
              data:
                item: '{{ task_name }}'
        - conditions: '{{ current_state == ''ok'' }}'
          sequence:
          - if: '{{ active_uids | length > 0 }}'
            then:
            - action: todo.update_item
              target:
                entity_id: !input todo_list
              data:
                item: '{{ active_uids[0] }}'
                status: completed
            - if: '{{ has_worker }}'
              then:
              - repeat:
                  for_each: '{{ notify_devs }}'
                  sequence:
                  - action: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                    data:
                      title: "\U0001F33F Plant Saved!"
                      message: >-
                        {% set dev = device_attr(repeat.item, 'name') | lower %}
                        {% if worker_name | lower in dev %}
                          Thank you! You slayed that task. ✅
                        {% else %}
                          {{ worker_name }} just saved the {{ raw_name }}! ❤️
                        {% endif %}
                      data:
                        tag: gratitude_{{ entity | slugify }}
              - event: gratitude_award
                event_data:
                  person: '{{ worker_name }}'
                  chore: Watering {{ raw_name }}
          - action: persistent_notification.dismiss
            data:
              notification_id: plant_{{ entity | slugify }}
